spring.application.name=pms-queue

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms

# JPA / H2 (learning default — teams swap to their own DB)
spring.datasource.url=jdbc:h2:mem:pmsqueue;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Resilience4j: 타입별 인스턴스 ---
# 시니어 노트: 공격/방어팀이 타입별로 임계치를 독립 튜닝할 수 있도록 분리.
# 값은 스캐폴드 기준이며, 성능 개선 과제에서 조정하는 것이 허용된다(외부 계약 변경이 아니므로).

# page_view: 볼륨 많음
resilience4j.ratelimiter.instances.events-page_view.limit-for-period=100
resilience4j.ratelimiter.instances.events-page_view.limit-refresh-period=1s
resilience4j.ratelimiter.instances.events-page_view.timeout-duration=0
resilience4j.circuitbreaker.instances.events-page_view.sliding-window-size=20
resilience4j.circuitbreaker.instances.events-page_view.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.events-page_view.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.events-page_view.permitted-number-of-calls-in-half-open-state=3

# click: 볼륨 매우 많음 — 샘플링 대상
resilience4j.ratelimiter.instances.events-click.limit-for-period=500
resilience4j.ratelimiter.instances.events-click.limit-refresh-period=1s
resilience4j.ratelimiter.instances.events-click.timeout-duration=0
resilience4j.circuitbreaker.instances.events-click.sliding-window-size=50
resilience4j.circuitbreaker.instances.events-click.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.events-click.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.events-click.permitted-number-of-calls-in-half-open-state=3

# search (query + result_click 공용)
resilience4j.ratelimiter.instances.events-search.limit-for-period=50
resilience4j.ratelimiter.instances.events-search.limit-refresh-period=1s
resilience4j.ratelimiter.instances.events-search.timeout-duration=0
resilience4j.circuitbreaker.instances.events-search.sliding-window-size=20
resilience4j.circuitbreaker.instances.events-search.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.events-search.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.events-search.permitted-number-of-calls-in-half-open-state=3

# purchase: 볼륨 적음, 손실 불가
resilience4j.ratelimiter.instances.events-purchase.limit-for-period=20
resilience4j.ratelimiter.instances.events-purchase.limit-refresh-period=1s
resilience4j.ratelimiter.instances.events-purchase.timeout-duration=0
resilience4j.circuitbreaker.instances.events-purchase.sliding-window-size=10
resilience4j.circuitbreaker.instances.events-purchase.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.events-purchase.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.events-purchase.permitted-number-of-calls-in-half-open-state=3

# api_error: 격리된 토픽
resilience4j.ratelimiter.instances.events-api_error.limit-for-period=50
resilience4j.ratelimiter.instances.events-api_error.limit-refresh-period=1s
resilience4j.ratelimiter.instances.events-api_error.timeout-duration=0
resilience4j.circuitbreaker.instances.events-api_error.sliding-window-size=20
resilience4j.circuitbreaker.instances.events-api_error.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.events-api_error.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.events-api_error.permitted-number-of-calls-in-half-open-state=3